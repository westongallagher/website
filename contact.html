<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Newsletter Signup</title>
    <!-- Link to the external CSS file -->
    <link rel="stylesheet" href="contact-styles.css">
</head>
<body>

    <form id="signupForm">
        <h2>Join Our List</h2>
        
        <!-- The Honeypot Trap Field -->
        <div class="hidden-field">
            <label for="username">Leave this blank</label>
            <input type="text" id="username" name="username">
        </div>

        <!-- The Real Field -->
        <label for="email">Email Address</label>
        <input type="email" id="email" name="email" required placeholder="you@example.com">
        
        <button type="submit" id="submitBtn">Submit</button>
        <div id="message"></div>
    </form>

    <script>
        const form = document.getElementById('signupForm');
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            btn.textContent = 'Sending...';
            btn.disabled = true;
            msg.textContent = '';

            const formData = new FormData(form);
            const payload = Object.fromEntries(formData.entries());

            try {
                // Change this URL to your live Cloudflare Worker endpoint later
                const response = await fetch('https://workers.dev', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });

                if (response.ok) {
                    msg.style.color = '#34c759';
                    msg.textContent = 'Successfully subscribed!';
                    form.reset();
                } else {
                    const errText = await response.text();
                    msg.style.color = '#ff3b30';
                    msg.textContent = errText || 'Submission failed.';
                }
            } catch (error) {
                msg.style.color = '#ff3b30';
                msg.textContent = 'Network error. Please try again.';
            } finally {
                btn.textContent = 'Submit';
                btn.disabled = false;
            }
        });
    </script>
</body>
</html>
